name: Test Expect

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-expect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Claude Code
        run: pnpm add -g @anthropic-ai/claude-code

      - name: Smoke test Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --version
          echo "What is 1+1?" | claude -p --max-turns 1

      - name: Start and wait for website server
        run: |
          cd apps/website
          npx next start -p 3000 > /tmp/next-server.log 2>&1 &
          SERVER_PID=$!
          sleep 3
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "::error::Next.js server crashed on startup:"
            cat /tmp/next-server.log
            exit 1
          fi
          pnpm dlx wait-on http-get://localhost:3000 --timeout 60000 || {
            echo "::error::Server timed out. Logs:"
            cat /tmp/next-server.log
            exit 1
          }

      - name: Run expect tests
        id: expect
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -o pipefail
          node apps/cli/dist/index.js --verbose -y -m \
            "Test the expect.dev marketing website at http://localhost:3000. \
            Verify the homepage loads, key sections are visible, and navigation works. \
            IMPORTANT: Run every test scenario to completion. If a step fails, record the failure \
            with evidence (screenshot or error) but continue testing remaining steps. Do not bail early." \
            2>&1 | tee /tmp/expect-output.txt

      - name: Upload session recording
        id: recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expect-session-recording
          path: /tmp/expect-replays/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment on commit
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.expect.outcome }}" = "success" ]; then
            STATUS="✅ Expect tests passed"
          else
            STATUS="❌ Expect tests failed"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          BODY="${STATUS}"
          BODY+=$'\n\n'"[Workflow run #${{ github.run_number }}](${RUN_URL})"

          if [ -f /tmp/expect-output.txt ]; then
            OUTPUT=$(tail -100 /tmp/expect-output.txt)
            BODY+=$'\n\n'"<details><summary>Test output</summary>"$'\n\n'"\`\`\`"$'\n'"${OUTPUT}"$'\n'"\`\`\`"$'\n'"</details>"
          fi

          ARTIFACT_ID="${{ steps.recording.outputs.artifact-id }}"
          if [ -n "$ARTIFACT_ID" ]; then
            BODY+=$'\n\n'"📎 [Download session recording](${RUN_URL}/artifacts/${ARTIFACT_ID})"
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"
          else
            gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
              -f body="$BODY"
          fi

      - name: Print expect debug logs
        if: always()
        run: |-
          if [ -f .expect/logs.md ]; then
            tail -n 240 .expect/logs.md
          else
            echo "No .expect/logs.md file found"
          fi

      - name: Fail if expect tests failed
        if: steps.expect.outcome == 'failure'
        run: |
          echo "::error::expect tests failed — see logs and artifacts above"
          exit 1
